trigger:
- main

pr:
  autoCancel: true
  branches:
    include:
    - main
    - release/*
  paths:
    exclude:
    - doc/*
    - LICENSE

stages:
  - stage: build
    displayName: Build and Test

    # Three jobs for each of the three OSes we want to run on
    jobs:
    - template: /eng/common/templates/jobs/jobs.yml
      parameters:
        enableTelemetry: true
        enablePublishBuildArtifacts: true
        helixRepo: Microsoft/clrmd

        jobs:
        - job: Windows_NT
          pool:
            name: NetCore-Public
            demands: ImageOverride -equals windows.vs2019.amd64.open

          variables:
          - DOTNET_ROLL_FORWARD_ON_NO_CANDIDATE_FX: 2

          strategy:
            matrix:
              build_debug:
                _BuildConfig: Debug
              build_release:
                _BuildConfig: Release

          steps:
          - script: eng\common\cibuild.cmd
              -configuration $(_BuildConfig)
              -prepareMachine
              -verbosity normal
            displayName: Build / Test
            condition: succeeded()

          - task: PublishTestResults@2
            displayName: Publish Test Results
            condition: always()
            continueOnError: true
            inputs:
              testResultsFormat: xUnit
              testResultsFiles: '**/*.xml'
              searchFolder: $(Build.SourcesDirectory)/artifacts/TestResults
              testRunTitle: Windows_x64_$(_BuildConfig)
              mergeTestResults: true
              failTaskOnFailedTests: false

        - job: Windows_x86
          displayName: Windows (x86 high-bit)
          pool:
            name: NetCore-Public
            demands: ImageOverride -equals windows.vs2019.amd64.open

          variables:
          - DOTNET_ROLL_FORWARD_ON_NO_CANDIDATE_FX: 2

          strategy:
            matrix:
              build_debug:
                _BuildConfig: Debug
              build_release:
                _BuildConfig: Release

          steps:
          # Arcade doesn't auto-provision an x86 SDK, and the agent image only
          # ships 64-bit dotnet. Install the x86 SDK matching global.json so the
          # x86 testhost can start.
          - powershell: |
              $global = Get-Content "$env:BUILD_SOURCESDIRECTORY\global.json" | ConvertFrom-Json
              $sdkVersion = $global.sdk.version
              Write-Host "Installing x86 .NET SDK $sdkVersion"
              # -runtime '' selects SDK install (the wrapper defaults to 'dotnet'
              # which would treat $sdkVersion as a runtime version and 404).
              & "$env:BUILD_SOURCESDIRECTORY\eng\common\dotnet-install.ps1" `
                  -architecture x86 `
                  -version $sdkVersion `
                  -runtime ''
              if ($LASTEXITCODE -ne 0) { throw "x86 dotnet install failed" }
              $installDir = "$env:BUILD_SOURCESDIRECTORY\.dotnet\x86"
              Write-Host "##vso[task.prependpath]$installDir"
              Write-Host "##vso[task.setvariable variable=DOTNET_ROOT(x86)]$installDir"
            displayName: Install .NET (x86)

          # Build and run the x64 side of Arcade's test target is not what we want
          # here -- skip tests during build so we can invoke Test.cmd x86 next.
          - script: eng\common\cibuild.cmd
              -configuration $(_BuildConfig)
              -prepareMachine
              -verbosity normal
              /p:SkipTests=true
            displayName: Build
            condition: succeeded()

          # Run the test suite in a 32-bit test host. The HighBitHost C++ harness is
          # built lazily by DumpGenerator on the first high-bit test; it requires the
          # Visual Studio C++ workload on this image.
          - script: Test.cmd x86
            displayName: Test (x86)
            condition: succeeded()

          - task: PublishTestResults@2
            displayName: Publish Test Results
            condition: always()
            continueOnError: true
            inputs:
              testResultsFormat: VSTest
              testResultsFiles: '**/*.trx'
              searchFolder: $(Build.SourcesDirectory)/artifacts
              testRunTitle: Windows_x86_$(_BuildConfig)
              mergeTestResults: true
              failTaskOnFailedTests: false

        - job: Linux
          pool:
            vmImage: ubuntu-22.04

          strategy:
            matrix:
              debug:
                _BuildConfig: Debug
              release:
                _BuildConfig: Release

          steps:
          - script: eng/common/cibuild.sh
              --configuration $(_BuildConfig)
              --prepareMachine
            displayName: Build / Test
            condition: succeeded()

          - task: PublishTestResults@2
            displayName: Publish Test Results
            condition: always()
            continueOnError: true
            inputs:
              testResultsFormat: xUnit
              testResultsFiles: '**/*.xml'
              searchFolder: $(Build.SourcesDirectory)/artifacts/TestResults
              testRunTitle: Linux_$(_BuildConfig)
              mergeTestResults: true
              failTaskOnFailedTests: false

        - job: MacOS
          pool:
            vmImage: macOS-latest

          strategy:
            matrix:
              debug:
                _BuildConfig: Debug
              release:
                _BuildConfig: Release

          steps:
          - script: eng/common/cibuild.sh
              --configuration $(_BuildConfig)
              --prepareMachine
            displayName: Build / Test
            condition: succeeded()

          - task: PublishTestResults@2
            displayName: Publish Test Results
            condition: always()
            continueOnError: true
            inputs:
              testResultsFormat: xUnit
              testResultsFiles: '**/*.xml'
              searchFolder: $(Build.SourcesDirectory)/artifacts/TestResults
              testRunTitle: MacOS_$(_BuildConfig)
              mergeTestResults: true
              failTaskOnFailedTests: false
