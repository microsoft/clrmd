trigger:
- main

pr:
  autoCancel: true
  branches:
    include:
    - main
    - release/*
  paths:
    exclude:
    - doc/*
    - LICENSE

stages:
  - stage: build
    displayName: Build and Test

    # Three jobs for each of the three OSes we want to run on
    jobs:
    - template: /eng/common/templates/jobs/jobs.yml
      parameters:
        enableTelemetry: true
        enablePublishBuildArtifacts: true
        helixRepo: Microsoft/clrmd

        jobs:
        - job: Windows_NT
          pool:
            name: NetCore-Public
            demands: ImageOverride -equals windows.vs2019.amd64.open

          variables:
          - DOTNET_ROLL_FORWARD_ON_NO_CANDIDATE_FX: 2

          strategy:
            matrix:
              build_debug:
                _BuildConfig: Debug
              build_release:
                _BuildConfig: Release

          steps:
          - script: eng\common\cibuild.cmd
              -configuration $(_BuildConfig)
              -prepareMachine
              -verbosity normal
            name: Build
            displayName: Build
            condition: succeeded()

          - script: Test.cmd x64
            displayName: Test (x64)
            condition: succeeded()

        - job: Windows_x86
          displayName: Windows (x86 high-bit)
          pool:
            name: NetCore-Public
            demands: ImageOverride -equals windows.vs2019.amd64.open

          variables:
          - DOTNET_ROLL_FORWARD_ON_NO_CANDIDATE_FX: 2

          strategy:
            matrix:
              build_debug:
                _BuildConfig: Debug
              build_release:
                _BuildConfig: Release

          steps:
          # Install the 32-bit .NET runtime so the x86 test host can start.
          # The image ships only 64-bit dotnet by default.
          - powershell: |
              $installDir = "$env:AGENT_TOOLSDIRECTORY\dotnet-x86"
              New-Item -ItemType Directory -Force -Path $installDir | Out-Null
              & "$env:BUILD_SOURCESDIRECTORY\eng\common\dotnet-install.ps1" `
                  -Architecture x86 `
                  -JSonFile "$env:BUILD_SOURCESDIRECTORY\global.json" `
                  -InstallDir $installDir
              if ($LASTEXITCODE -ne 0) { throw "x86 dotnet install failed" }
              Write-Host "##vso[task.prependpath]$installDir"
              Write-Host "##vso[task.setvariable variable=DOTNET_ROOT(x86)]$installDir"
            displayName: Install .NET (x86)

          # Build the solution (no tests). cibuild.cmd hardcodes -test so we invoke
          # build.cmd directly with the same flags minus -test.
          - script: eng\common\build.cmd
              -restore
              -build
              -sign
              -pack
              -publish
              -ci
              -configuration $(_BuildConfig)
              -prepareMachine
              -verbosity normal
            displayName: Build (no tests)
            condition: succeeded()

          # Run the test suite in a 32-bit test host. The HighBitHost C++ harness is
          # built lazily by DumpGenerator on the first high-bit test; it requires the
          # Visual Studio C++ workload on this image.
          - script: Test.cmd x86
            displayName: Test (x86)
            condition: succeeded()

        - job: Linux
          pool:
            vmImage: ubuntu-22.04

          strategy:
            matrix:
              debug:
                _BuildConfig: Debug
              release:
                _BuildConfig: Release

          steps:
          - script: eng/common/cibuild.sh
              --configuration $(_BuildConfig)
              --prepareMachine
            name: Build
            displayName: Build
            condition: succeeded()

          - script: ./test.sh x64
            displayName: Test (x64)
            condition: succeeded()

        - job: MacOS
          pool:
            vmImage: macOS-latest

          strategy:
            matrix:
              debug:
                _BuildConfig: Debug
              release:
                _BuildConfig: Release

          steps:
          - script: eng/common/cibuild.sh
              --configuration $(_BuildConfig)
              --prepareMachine
            name: Build
            displayName: Build
            condition: succeeded()

          - script: ./test.sh x64
            displayName: Test (x64)
            condition: succeeded()
